<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-Lang Dictionary</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; text-align: center; }
        input, select, button { padding: 10px; margin: 5px; }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h1>Global Dict</h1>
    <input type="text" id="word" placeholder="Enter English word...">
    <select id="lang">
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
    </select>
    <button onclick="translate()">Translate</button>
    <div id="result">Result</div>

    <script>
        const dict = {
            hello: { es: "Hola", fr: "Bonjour", de: "Hallo" },
            apple: { es: "Manzana", fr: "Pomme", de: "Apfel" },
            water: { es: "Agua", fr: "Eau", de: "Wasser" }
        };

        function translate() {
            const word = document.getElementById('word').value.toLowerCase();
            const lang = document.getElementById('lang').value;
            const output = dict[word] ? dict[word][lang] : "Word not found.";
            document.getElementById('result').innerText = output;
        }
    </script>
</body>
</html>
